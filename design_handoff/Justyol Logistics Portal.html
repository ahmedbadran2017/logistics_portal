<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Justyol Logistics Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com?plugins=line-clamp"></script>
<script>
  const ACCENTS = {
    rust:    { 50:"#fdf5f3", 100:"#fbe6e0", 200:"#f6ccbf", 300:"#eea894", 400:"#e17f62", 500:"#d45d3e", 600:"#c4492a", 700:"#a33a22", 800:"#852f1e", 900:"#6d291d" },
    indigo:  { 50:"#eef2ff", 100:"#e0e7ff", 200:"#c7d2fe", 300:"#a5b4fc", 400:"#818cf8", 500:"#6366f1", 600:"#4f46e5", 700:"#4338ca", 800:"#3730a3", 900:"#312e81" },
    emerald: { 50:"#ecfdf5", 100:"#d1fae5", 200:"#a7f3d0", 300:"#6ee7b7", 400:"#34d399", 500:"#10b981", 600:"#059669", 700:"#047857", 800:"#065f46", 900:"#064e3b" },
    violet:  { 50:"#f5f3ff", 100:"#ede9fe", 200:"#ddd6fe", 300:"#c4b5fd", 400:"#a78bfa", 500:"#8b5cf6", 600:"#7c3aed", 700:"#6d28d9", 800:"#5b21b6", 900:"#4c1d95" },
    teal:    { 50:"#f0fdfa", 100:"#ccfbf1", 200:"#99f6e4", 300:"#5eead4", 400:"#2dd4bf", 500:"#14b8a6", 600:"#0d9488", 700:"#0f766e", 800:"#115e59", 900:"#134e4a" },
  };
  function applyAccent(name) {
    const p = ACCENTS[name] || ACCENTS.rust;
    Object.entries(p).forEach(([k, v]) => document.documentElement.style.setProperty(`--accent-${k}`, v));
  }
  applyAccent("rust");
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ["Inter", "Noto Sans Arabic", "ui-sans-serif", "system-ui"], mono: ["JetBrains Mono", "ui-monospace"] },
      letterSpacing: { tighter: "-0.02em", tight: "-0.01em" },
      animation: {
        "fade-in":   "fadeIn 220ms cubic-bezier(0.16, 1, 0.3, 1)",
        "scale-in":  "scaleIn 240ms cubic-bezier(0.16, 1, 0.3, 1)",
        "menu":      "menuIn 140ms cubic-bezier(0.16, 1, 0.3, 1)",
        "toast-in":  "toastIn 280ms cubic-bezier(0.16, 1, 0.3, 1)",
        "tip":       "tipIn 120ms cubic-bezier(0.16, 1, 0.3, 1)",
        "drawer-in": "drawerIn 280ms cubic-bezier(0.16, 1, 0.3, 1)",
      },
      keyframes: {
        fadeIn:  { "0%":{opacity:"1",transform:"translateY(6px)"}, "100%":{opacity:"1",transform:"translateY(0)"} },
        scaleIn: { "0%":{opacity:"1",transform:"scale(.97)"}, "100%":{opacity:"1",transform:"scale(1)"} },
        menuIn:  { "0%":{opacity:"1",transform:"translateY(-4px) scale(.98)"}, "100%":{opacity:"1",transform:"translateY(0) scale(1)"} },
        toastIn: { "0%":{opacity:"1",transform:"translate(-50%, 12px)"}, "100%":{opacity:"1",transform:"translate(-50%, 0)"} },
        tipIn:   { "0%":{opacity:"1"}, "100%":{opacity:"1"} },
        drawerIn:{ "0%":{opacity:"1",transform:"translateX(24px)"}, "100%":{opacity:"1",transform:"translateX(0)"} },
      },
    } },
  };
</script>

<style>
  :root {
    --accent-50:#fdf5f3; --accent-100:#fbe6e0; --accent-200:#f6ccbf; --accent-300:#eea894;
    --accent-400:#e17f62; --accent-500:#d45d3e; --accent-600:#c4492a; --accent-700:#a33a22;
    --accent-800:#852f1e; --accent-900:#6d291d;
  }
  html, body { font-family: "Inter", "Noto Sans Arabic", ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-feature-settings: "cv11","ss01"; }
  body { background: #f5f5f4; color: #1c1917; margin: 0; }
  html[dir="rtl"] body { font-family: "Noto Sans Arabic", "Inter", ui-sans-serif, system-ui, sans-serif; }
  html[data-density="compact"] { font-size: 13.5px; }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: #d6d3d1; background-clip: padding-box; }
  ::selection { background: var(--accent-100); color: var(--accent-900); }
  * { -webkit-tap-highlight-color: transparent; }
  button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--accent-500); outline-offset: 2px; border-radius: 6px; }
  /* RTL drawer slide-in */
  @keyframes drawerInL { 0% { opacity:1; transform: translateX(-24px);} 100% { opacity:1; transform: translateX(0);} }
  .print-label { display: none; }
  /* ── Dark theme (curated utility remap) ── */
  html[data-theme="dark"] body { background:#1c1917; color:#f5f5f4; }
  html[data-theme="dark"] .bg-white { background-color:#292524 !important; }
  html[data-theme="dark"] .bg-white\/80, html[data-theme="dark"] .bg-white\/90, html[data-theme="dark"] .bg-white\/95 { background-color:rgba(41,37,36,0.92) !important; }
  html[data-theme="dark"] .bg-stone-50, html[data-theme="dark"] .bg-stone-50\/60, html[data-theme="dark"] .bg-stone-50\/80, html[data-theme="dark"] .bg-stone-50\/40, html[data-theme="dark"] .bg-stone-50\/30 { background-color:#1c1917 !important; }
  html[data-theme="dark"] .bg-stone-100, html[data-theme="dark"] .bg-stone-100\/80, html[data-theme="dark"] .bg-stone-100\/70, html[data-theme="dark"] .bg-stone-100\/60 { background-color:#3a3530 !important; }
  html[data-theme="dark"] .text-stone-900 { color:#f5f5f4 !important; }
  html[data-theme="dark"] .text-stone-800 { color:#e7e5e4 !important; }
  html[data-theme="dark"] .text-stone-700 { color:#d6d3d1 !important; }
  html[data-theme="dark"] .text-stone-600 { color:#c0bbb5 !important; }
  html[data-theme="dark"] .text-stone-500 { color:#a8a29e !important; }
  html[data-theme="dark"] .text-stone-400 { color:#8c857c !important; }
  html[data-theme="dark"] .text-stone-300 { color:#6b645c !important; }
  html[data-theme="dark"] .ring-stone-200, html[data-theme="dark"] .ring-stone-200\/70, html[data-theme="dark"] .ring-stone-200\/60, html[data-theme="dark"] .ring-stone-100, html[data-theme="dark"] .ring-stone-300 { --tw-ring-color:#44403c !important; }
  html[data-theme="dark"] .border-stone-100, html[data-theme="dark"] .border-stone-200, html[data-theme="dark"] .border-stone-200\/70, html[data-theme="dark"] .border-stone-200\/60, html[data-theme="dark"] .divide-stone-100 > :not([hidden]) ~ :not([hidden]) { border-color:#3a3530 !important; }
  html[data-theme="dark"] .hover\:bg-stone-50:hover, html[data-theme="dark"] .hover\:bg-stone-100:hover, html[data-theme="dark"] .hover\:bg-stone-100\/70:hover { background-color:#3a3530 !important; }
  html[data-theme="dark"] *::-webkit-scrollbar-thumb { background:#44403c; }
  html[data-theme="dark"] img[alt="Justyol"] { filter: invert(1) brightness(1.8); }
  @media print {
    body * { visibility: hidden !important; }
    .print-label, .print-label * { visibility: visible !important; }
    .print-label { display: block !important; position: fixed; inset: 0; margin: 0; padding: 24px; background: #fff; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- v2 component kit (shared with the Yol Admin product) -->
<script type="text/babel" src="frontend/v2/primitives.jsx"></script>
<!-- logistics layer -->
<script type="text/babel" src="logistics/data.jsx"></script>
<script type="text/babel" src="logistics/components.jsx"></script>
<script type="text/babel" src="logistics/shell.jsx"></script>
<script type="text/babel" src="logistics/cockpit.jsx"></script>
<script type="text/babel" src="logistics/dispatcher.jsx"></script>
<script type="text/babel" src="logistics/picker.jsx"></script>
<script type="text/babel" src="logistics/packer.jsx"></script>
<script type="text/babel" src="logistics/returns.jsx"></script>
<script type="text/babel" src="logistics/inventory.jsx"></script>
<script type="text/babel" src="logistics/ordertimeline.jsx"></script>
<script type="text/babel" src="logistics/workspaces.jsx"></script>
<script type="text/babel" src="logistics/analytics.jsx"></script>
<script type="text/babel" src="logistics/team.jsx"></script>
<script type="text/babel" src="logistics/warehouse.jsx"></script>
<script type="text/babel" src="logistics/ops.jsx"></script>
<script type="text/babel" src="logistics/floor.jsx"></script>
<script type="text/babel" src="logistics/settings.jsx"></script>
<script type="text/babel" src="logistics/order.jsx"></script>
<script type="text/babel" src="logistics/picklist.jsx"></script>
<script type="text/babel" src="logistics/ux.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "rust",
  "density": "comfortable",
  "meterStyle": "ring",
  "perfTone": "coaching",
  "connection": "online",
  "theme": "light"
}/*EDITMODE-END*/;

function App() {
  const [role, setRole] = useState("manager");
  const [lang, setLang] = useState("en");
  const [page, setPage] = useState("cockpit");
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [toast, setToast] = useState(null);
  const [notif, setNotif] = useState(false);
  const [unread, setUnread] = useState(3);
  const [tlOrder, setTlOrder] = useState(null);
  const [orderNo, setOrderNo] = useState(null);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [confirmState, setConfirmState] = useState(null);

  const dir = (window.LG_STRINGS[lang]?._dir) || "ltr";
  const t = useMemo(() => window.makeT(lang), [lang]);

  // apply lang + dir
  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = dir;
  }, [lang, dir]);

  // apply tweaks
  useEffect(() => {
    window.applyAccent(tweaks.accent);
    document.documentElement.dataset.density = tweaks.density;
    window.__lgMeter = tweaks.meterStyle;
    window.__lgPerfTone = tweaks.perfTone;
    document.documentElement.dataset.theme = tweaks.theme || "light";
  }, [tweaks]);

  // ⌘K command palette
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdOpen((v) => !v); }
    }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);

  // tweaks bridge
  useEffect(() => {
    function onMsg(e) {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data.type === "__deactivate_edit_mode") setShowTweaks(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  function setTweak(patch) {
    setTweaks((tw) => ({ ...tw, ...patch }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  }

  function changeRole(r) {
    setRole(r);
    const home = window.LG_ROLES.find((x) => x.id === r)?.home;
    setPage(home);
    setNotif(false);
  }
  function fireToast(tt) { setToast(tt); setTimeout(() => setToast(null), 3000); }

  const roleMeta = window.LG_ROLES.find((r) => r.id === role);
  const isMobile = roleMeta.device === "mobile";

  function renderPage() {
    switch (page) {
      case "cockpit":   return <window.Cockpit onAlertAction={() => setNotif(true)} />;
      case "assign":    return <window.Dispatcher onToast={fireToast} />;
      case "label":     return <window.Packer onToast={fireToast} initialTab="label" />;
      case "manifest":  return <window.Packer onToast={fireToast} initialTab="manifest" />;
      case "returns":   return <window.Returns onToast={fireToast} />;
      case "tracking":  return <window.Tracking />;
      case "routes":    return <window.RoutesBoard onToast={fireToast} />;
      case "inventory": return <window.Inventory />;
      case "warehouse": return <window.Warehouse onToast={fireToast} />;
      case "cod":       return <window.CODReconcile onToast={fireToast} />;
      case "exceptions":return <window.ExceptionCenter onToast={fireToast} />;
      case "pack":      return <window.PackStation onToast={fireToast} />;
      case "waves":     return <window.WavePicking onToast={fireToast} />;
      case "andon":     return <window.FloorBoard />;
      case "carriers":  return <window.CarrierScorecard onToast={fireToast} />;
      case "orders":    return <window.OrdersList />;
      case "picklists": return <window.PickLists onToast={fireToast} dir={dir} />;
      case "shipments": return <window.Shipments onToast={fireToast} dir={dir} />;
      case "sla":       return <window.SlaBoard />;
      case "stock":     return <window.Stock />;
      case "restocking":return <window.Restocking onToast={fireToast} />;
      case "analysis":  return <window.StockAnalysis />;
      case "reports":   return <window.Reports onToast={fireToast} />;
      case "team":      return <window.TeamAdmin onToast={fireToast} dir={dir} />;
      case "bonus":     return <window.BonusBoard onToast={fireToast} />;
      case "roster":    return <window.Roster />;
      case "alerts":    return <window.NotificationsPage onOpenOrder={openOrderPage} />;
      case "settings":  return <window.LogisticsSettings onToast={fireToast} />;
      case "performance": return <window.TeamPerformance self={role === "dispatcher" ? "asmaa" : "marouane"} />;
      case "order":     return <window.OrderDetail no={orderNo} onBack={() => setPage("orders")} />;
      default:          return <window.Cockpit />;
    }
  }

  function openOrderPage(no) { setOrderNo(no); setPage("order"); }
  function askConfirm(c) { setConfirmState(c); }
  const offline = tweaks.connection === "offline";
  const ctx = { t, lang, dir, setLang, openOrder: (no) => setTlOrder(no), openOrderPage, go: setPage, openCmd: () => setCmdOpen(true), askConfirm };

  return (
    <window.LgContext.Provider value={ctx}>
      {isMobile ? (
        <MobileStage role={role} onRole={changeRole} t={t} />
      ) : (
        <window.DesktopShell role={role} page={page} onNav={setPage} onRole={changeRole} onBell={() => { setNotif(true); setUnread(0); }} unread={unread} onOpenCmd={() => setCmdOpen(true)}>
          {renderPage()}
        </window.DesktopShell>
      )}

      {/* Notification center */}
      {notif && <NotifCenter dir={dir} t={t} onClose={() => setNotif(false)} />}

      {tlOrder && <window.OrderTimelineDrawer orderNo={tlOrder} onClose={() => setTlOrder(null)} dir={dir} />}
      <window.CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} onGo={(p) => setPage(p)} onOrder={openOrderPage} />
      <window.ConfirmDialog state={confirmState} onClose={() => setConfirmState(null)} />
      {offline && <window.OfflineBanner queued={2} />}

      <window.Toast toast={toast} />
      {showTweaks && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => setShowTweaks(false)} />}
    </window.LgContext.Provider>
  );
}

// Mobile stage — phone centered on a soft backdrop, role switch floats.
function MobileStage({ role, onRole, t }) {
  const D = window.LG_DATA;
  return (
    <div className="h-screen w-screen overflow-auto bg-gradient-to-br from-stone-100 to-stone-200 flex flex-col items-center justify-center p-6 gap-5">
      <div className="fixed top-4 start-4 z-30 flex items-center gap-2 bg-white/90 backdrop-blur rounded-xl ring-1 ring-stone-200 shadow-[0_4px_24px_-8px_rgba(0,0,0,0.15)] px-2 py-1.5">
        <img src="logistics/justyol-logo.png" alt="Justyol" className="block ms-1 me-0.5" style={{ height: 13 }} />
        <window.RoleSwitcher role={role} onRole={onRole} />
      </div>
      <window.PhoneFrame label={`${D.byId("marouane").name} · ${D.WAREHOUSE}`}>
        <window.PickerApp />
      </window.PhoneFrame>
    </div>
  );
}

// Notification center slide-over
function NotifCenter({ dir, t, onClose }) {
  const D = window.LG_DATA;
  const side = dir === "rtl" ? "left-0" : "right-0";
  const anim = dir === "rtl" ? "animate-[drawerInL_.28s_cubic-bezier(.16,1,.3,1)]" : "animate-drawer-in";
  return (
    <div className="fixed inset-0 z-[130]">
      <div className="absolute inset-0 bg-stone-900/20 backdrop-blur-[1px] animate-fade-in" onClick={onClose} />
      <div className={`absolute top-0 ${side} h-full w-full max-w-[400px] bg-stone-50 shadow-[0_0_60px_-10px_rgba(0,0,0,0.3)] flex flex-col ${anim}`} dir={dir}>
        <header className="h-[56px] bg-white border-b border-stone-200/70 flex items-center px-4 gap-3 flex-shrink-0">
          <window.I.Bell width={17} height={17} className="text-stone-700" />
          <div className="flex-1 text-[14px] font-semibold text-stone-900">{t("c.notifications")}</div>
          <button className="text-[11.5px] font-medium text-[var(--accent-700)]">{t("c.markRead")}</button>
          <window.IconButton icon={window.I.X} onClick={onClose} />
        </header>
        <div className="flex-1 overflow-y-auto p-3 space-y-2.5">
          {D.AUDIT.map((a, i) => <window.AlertRow key={i} item={a} onAction={onClose} />)}
        </div>
      </div>
    </div>
  );
}

// ── Tweaks panel ─────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweak, onClose }) {
  const accents = [
    { v: "rust", hex: "#c4492a" }, { v: "indigo", hex: "#4f46e5" }, { v: "emerald", hex: "#059669" },
    { v: "violet", hex: "#7c3aed" }, { v: "teal", hex: "#0d9488" },
  ];
  const Seg = ({ k, opts }) => (
    <div className="inline-flex bg-stone-100/80 rounded-lg p-0.5 w-full">
      {opts.map((o) => (
        <button key={o.v} onClick={() => setTweak({ [k]: o.v })}
          className={`flex-1 h-7 text-[12px] font-medium rounded-md transition-all ${tweaks[k] === o.v ? "bg-white text-stone-900 shadow-[0_1px_2px_rgba(0,0,0,0.06)]" : "text-stone-500 hover:text-stone-700"}`}>
          {o.l}
        </button>
      ))}
    </div>
  );
  return (
    <div className="fixed bottom-5 end-5 z-[160] w-[280px] bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_24px_64px_-16px_rgba(0,0,0,0.22),0_0_0_1px_rgba(0,0,0,0.06)] overflow-hidden animate-scale-in" dir="ltr">
      <div className="flex items-center justify-between px-3.5 py-2.5 border-b border-stone-100">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-md bg-[var(--accent-100)] text-[var(--accent-700)] flex items-center justify-center"><window.I.Sliders width={13} height={13} /></div>
          <span className="text-[13px] font-semibold text-stone-900">Tweaks</span>
        </div>
        <window.IconButton icon={window.I.X} size={24} onClick={onClose} />
      </div>
      <div className="p-3.5 space-y-4">
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">Accent</div>
          <div className="grid grid-cols-5 gap-1.5">
            {accents.map((a) => (
              <button key={a.v} onClick={() => setTweak({ accent: a.v })}
                className={`h-9 rounded-lg transition-all relative ${tweaks.accent === a.v ? "ring-2 ring-offset-2 ring-stone-900" : "hover:scale-[1.06]"}`} style={{ background: a.hex }}>
                {tweaks.accent === a.v && <window.I.Check width={12} height={12} className="absolute inset-0 m-auto text-white" />}
              </button>
            ))}
          </div>
        </div>
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">SLA meter</div>
          <Seg k="meterStyle" opts={[{v:"ring",l:"Ring"},{v:"bar",l:"Bar"}]} />
        </div>
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">Performance tone</div>
          <Seg k="perfTone" opts={[{v:"coaching",l:"Coaching"},{v:"neutral",l:"Neutral"}]} />
        </div>
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">Density</div>
          <Seg k="density" opts={[{v:"comfortable",l:"Comfortable"},{v:"compact",l:"Compact"}]} />
        </div>
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">Theme</div>
          <Seg k="theme" opts={[{v:"light",l:"Light"},{v:"dark",l:"Dark"}]} />
        </div>
        <div>
          <div className="text-[10.5px] font-semibold text-stone-500 uppercase tracking-[0.06em] mb-2">Connection (floor wifi)</div>
          <Seg k="connection" opts={[{v:"online",l:"Online"},{v:"offline",l:"Offline"}]} />
        </div>
        <div className="pt-1 text-[10.5px] text-stone-400 leading-snug">Switch role (sidebar) &amp; language (top bar) live · العربية flips to RTL.</div>
      </div>
    </div>
  );
}

function tryMount() {
